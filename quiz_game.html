<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Ultra Quiz</title>
  <style>
    :root {
      --bg-start: #0f172a;
      --bg-end: #1f3b73;
      --card-bg: rgba(255, 255, 255, 0.96);
      --card-border: rgba(255, 255, 255, 0.24);
      --text: #122033;
      --muted: #5b677b;
      --accent: #e8b23a;
      --accent-hover: #d89c1c;
      --accent-soft: #fff4d6;
      --success: #1c7c45;
      --success-soft: #e4f6ea;
      --danger: #b42318;
      --danger-soft: #fde8e6;
      --shadow: 0 24px 70px rgba(4, 10, 25, 0.35);
      --radius: 22px;
      --focus: 0 0 0 4px rgba(232, 178, 58, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      color: var(--text);
      font-family: "Yu Gothic UI", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.15), transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(232, 178, 58, 0.2), transparent 30%),
        linear-gradient(160deg, var(--bg-start), var(--bg-end));
    }

    .quiz-card {
      width: min(560px, 100%);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding-bottom: 14px;
      margin-bottom: 18px;
      border-bottom: 1px solid rgba(18, 32, 51, 0.1);
      font-weight: 700;
      color: var(--muted);
    }

    .topbar strong {
      color: var(--text);
    }

    .question-area {
      min-height: 132px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 16px;
      margin-bottom: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f6f8fc 100%);
      border: 1px solid rgba(18, 32, 51, 0.08);
    }

    .question-text {
      margin: 0;
      font-size: clamp(1.3rem, 2.8vw, 1.8rem);
      line-height: 1.55;
      font-weight: 800;
      letter-spacing: 0.02em;
      word-break: keep-all;
    }

    .message {
      min-height: 52px;
      margin-bottom: 16px;
      border-radius: 14px;
      border: 1px solid rgba(18, 32, 51, 0.08);
      background: #f8fafc;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 12px 14px;
      line-height: 1.5;
    }

    .message.success {
      background: var(--success-soft);
      color: var(--success);
      border-color: rgba(28, 124, 69, 0.16);
    }

    .message.error {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: rgba(180, 35, 24, 0.16);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .controls input {
      flex: 1 1 auto;
      min-width: 0;
      border: 1px solid rgba(18, 32, 51, 0.18);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .controls input:focus {
      border-color: var(--accent);
      box-shadow: var(--focus);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, background-color 0.15s ease, opacity 0.15s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    .primary-btn {
      min-width: 118px;
      color: #fff;
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-hover) 100%);
      box-shadow: 0 10px 24px rgba(216, 156, 28, 0.26);
    }

    .ghost-btn {
      width: 100%;
      color: #183153;
      background: var(--accent-soft);
      border: 1px solid rgba(232, 178, 58, 0.35);
    }

    .start-wrap,
    .footer {
      display: flex;
      justify-content: center;
    }

    .start-btn {
      padding-inline: 24px;
      min-width: 160px;
      color: #fff;
      background: linear-gradient(180deg, #111111 0%, #000000 100%);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.28);
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .quiz-card {
        padding: 18px;
      }

      .topbar {
        font-size: 0.92rem;
      }

      .controls {
        flex-direction: column;
      }

      .controls button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="quiz-card" aria-label="&#x30AF;&#x30A4;&#x30BA;&#x30B2;&#x30FC;&#x30E0;">
    <div class="topbar">
      <div id="questionCounter">&#x554F;&#x984C; 0 / 5</div>
      <div id="scoreDisplay">&#x30B9;&#x30B3;&#x30A2;: 0</div>
    </div>

    <section class="question-area" aria-live="polite" aria-atomic="true">
      <p class="question-text" id="questionText">&#x30B9;&#x30BF;&#x30FC;&#x30C8;&#x30DC;&#x30BF;&#x30F3;&#x3092;&#x62BC;&#x3057;&#x3066;&#x30B2;&#x30FC;&#x30E0;&#x3092;&#x59CB;&#x3081;&#x3066;&#x304F;&#x3060;&#x3055;&#x3044;&#x3002;</p>
    </section>

    <div class="message" id="feedback" aria-live="polite">&#x5168;5&#x554F;&#x306E;&#x30AF;&#x30A4;&#x30BA;&#x3067;&#x3059;&#x3002;</div>

    <div class="controls">
      <input id="answerInput" type="text" placeholder="&#x7B54;&#x3048;&#x3092;&#x5165;&#x529B;&#x3057;&#x3066;&#x304F;&#x3060;&#x3055;&#x3044;" disabled />
      <button id="submitButton" class="primary-btn" disabled>&#x56DE;&#x7B54;&#x3059;&#x308B;</button>
    </div>

    <div class="start-wrap" id="startArea">
      <button id="startButton" class="primary-btn start-btn">&#x30B9;&#x30BF;&#x30FC;&#x30C8;</button>
    </div>

    <div class="footer">
      <button id="restartButton" class="ghost-btn hidden">&#x3082;&#x3046;&#x4E00;&#x5EA6;</button>
    </div>
  </main>

  <script>
    const questions = [
      { question: "\u65e5\u672c\u306e\u9996\u90fd\u306f\uff1f", answer: "\u6771\u4eac" },
      { question: "\u30a4\u30ae\u30ea\u30b9\u306e\u9996\u90fd\u306f\uff1f", answer: "\u30ed\u30f3\u30c9\u30f3" },
      { question: "\u97d3\u56fd\u306e\u9996\u90fd\u306f\uff1f", answer: "\u30bd\u30a6\u30eb" },
      { question: "\u30aa\u30fc\u30b9\u30c8\u30e9\u30ea\u30a2\u306e\u9996\u90fd\u306f\uff1f", answer: "\u30ad\u30e3\u30f3\u30d9\u30e9" },
      { question: "\u30d6\u30e9\u30b8\u30eb\u306e\u9996\u90fd\u306f\uff1f", answer: "\u30d6\u30e9\u30b8\u30ea\u30a2" }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let isPlaying = false;

    const questionCounter = document.getElementById("questionCounter");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const questionText = document.getElementById("questionText");
    const feedback = document.getElementById("feedback");
    const answerInput = document.getElementById("answerInput");
    const submitButton = document.getElementById("submitButton");
    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const startArea = document.getElementById("startArea");

    function updateHeader() {
      const displayIndex = isPlaying ? currentQuestionIndex + 1 : currentQuestionIndex;
      questionCounter.textContent = `\u554f\u984c ${Math.min(displayIndex, questions.length)} / ${questions.length}`;
      scoreDisplay.textContent = `\u30b9\u30b3\u30a2: ${score}`;
    }

    function setFeedback(message, type = "") {
      feedback.textContent = message;
      feedback.className = "message";
      if (type) {
        feedback.classList.add(type);
      }
    }

    function startGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = true;

      startArea.classList.add("hidden");
      restartButton.classList.add("hidden");
      answerInput.disabled = false;
      submitButton.disabled = false;
      answerInput.value = "";

      updateHeader();
      showQuestion();
      setFeedback("\u5168\u4f55\u554f\u306e\u30af\u30a4\u30ba\u3092\u59cb\u3081\u307e\u3059\u3002");
      answerInput.focus();
    }

    function showQuestion() {
      const currentQuestion = questions[currentQuestionIndex];
      if (!currentQuestion) {
        finishGame();
        return;
      }

      questionText.textContent = currentQuestion.question;
      answerInput.value = "";
      updateHeader();
      answerInput.focus();
    }

    function submitAnswer() {
      if (!isPlaying) {
        return;
      }

      const currentQuestion = questions[currentQuestionIndex];
      const userAnswer = answerInput.value.trim();
      const correctAnswer = currentQuestion.answer.trim();

      if (userAnswer === correctAnswer) {
        score += 1;
        setFeedback("\u6b63\u89e3\u3067\u3059\u3002", "success");
      } else {
        setFeedback(`\u4e0d\u6b63\u89e3\u3067\u3059\u3002\u6b63\u89e3\u306f\u300c${correctAnswer}\u300d\u3067\u3059\u3002`, "error");
      }

      currentQuestionIndex += 1;
      updateHeader();

      if (currentQuestionIndex < questions.length) {
        setTimeout(() => {
          if (!isPlaying) {
            return;
          }
          showQuestion();
          setFeedback("\u6b21\u306e\u554f\u984c\u3067\u3059\u3002");
        }, 450);
      } else {
        setTimeout(() => {
          if (!isPlaying) {
            return;
          }
          finishGame();
        }, 450);
      }
    }

    function finishGame() {
      isPlaying = false;
      answerInput.disabled = true;
      submitButton.disabled = true;
      questionText.textContent = `\u5168\u554f\u7d42\u4e86\uff01 \u6700\u7d42\u30b9\u30b3\u30a2\u306f ${score} / ${questions.length} \u3067\u3059\u3002`;
      setFeedback("\u30b2\u30fc\u30e0\u7d42\u4e86\u3067\u3059\u3002\u300c\u3082\u3046\u4e00\u5ea6\u300d\u3067\u518d\u6311\u6226\u3067\u304d\u307e\u3059\u3002");
      restartButton.classList.remove("hidden");
      updateHeader();
    }

    function resetGame() {
      currentQuestionIndex = 0;
      score = 0;
      isPlaying = false;

      answerInput.value = "";
      answerInput.disabled = true;
      submitButton.disabled = true;
      restartButton.classList.add("hidden");
      startArea.classList.remove("hidden");

      questionText.textContent = "\u30b9\u30bf\u30fc\u30c8\u30dc\u30bf\u30f3\u3092\u62bc\u3057\u3066\u30b2\u30fc\u30e0\u3092\u59cb\u3081\u3066\u304f\u3060\u3055\u3044\u3002";
      setFeedback("\u5168\u4f55\u554f\u306e\u30af\u30a4\u30ba\u3067\u3059\u3002");
      updateHeader();
      startButton.focus();
    }

    startButton.addEventListener("click", startGame);
    restartButton.addEventListener("click", resetGame);
    submitButton.addEventListener("click", submitAnswer);

    answerInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        submitAnswer();
      }
    });

    updateHeader();
  </script>
</body>
</html>
